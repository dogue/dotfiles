import:
  - ~/.alacritty-colorscheme/themes/ayu_dark.yaml

colors:
  # Default colors
  primary:
    background: '#121212'
    foreground: '#B3B1AD'

  # Normal colors
  normal:
    black: '#0a0a0a'
    red: '#EA6C73'
    green: '#91B362'
    yellow: '#F9AF4F'
    blue: '#53BDFA'
    magenta: '#FAE994'
    cyan: '#90E1C6'
    white: '#C7C7C7'

  # Bright colors
  bright:
    black: '#686868'
    red: '#F07178'
    green: '#C2D94C'
    yellow: '#FFB454'
    blue: '#59C2FF'
    magenta: '#FFEE99'
    cyan: '#95E6CB'
    white: '#FFFFFF'

font:
  size: 12.0
theme: Ayu-Dark
